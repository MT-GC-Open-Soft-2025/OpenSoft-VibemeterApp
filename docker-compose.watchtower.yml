services:
  watchtower:
    image: containrrr/watchtower:1.5.3
    container_name: vibemeter-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --rolling-restart --interval ${WATCHTOWER_POLL_INTERVAL_SECONDS:-300}