name: Build & Publish Docker Images

# Triggers:
#   - push to main  → tags with `latest` + short SHA
#   - push of a semver tag (v1.2.3) → tags with full version, major.minor, latest
#   - pull request against main     → build only (no push), validates Dockerfiles
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/mt-gc-open-soft-2025/vibemeter-backend
  FRONTEND_IMAGE: ghcr.io/mt-gc-open-soft-2025/vibemeter-frontend

jobs:
  # ─────────────────────────────────────────────
  # Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint backend
        working-directory: ./backend
        run: ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

  # ─────────────────────────────────────────────
  # Backend: Python / FastAPI image
  # ─────────────────────────────────────────────
  build-backend:
    needs: test
    name: Build & Push Backend
    runs-on: ubuntu-latest

    permissions:
      contents: read       # checkout
      packages: write      # push to ghcr.io
      attestations: write  # supply-chain attestation
      id-token: write      # OIDC for attestation signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx enables advanced build features (cache exporters, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we will actually push (not on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives tags and OCI labels from git context:
      #   • semver tags  (v1.2.3 → 1.2.3, 1.2)
      #   • short SHA    (sha-abc1234)
      #   • `latest`     (only on default branch)
      - name: Extract Docker metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache scoped per image so backend/frontend don't share cache slots
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Attach SLSA build-provenance attestation to the pushed image
      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────
  # Frontend: React → Nginx image
  # ─────────────────────────────────────────────
  build-frontend:
    needs: test
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for frontend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_API_BASE_URL is a GitHub Actions repository variable.
          # Set it at: Settings → Secrets and variables → Actions → Variables
          # Example value: https://api.wellbee.live
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.FRONTEND_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
