name: Deploy to DO App Platform

# This workflow was previously located at frontend/.github/workflows/deploy.yml
# and was not being picked up by GitHub. Moved to the repository root.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Deploy to App Platform
        run: |
          doctl apps update 0d932220-a81b-42c9-861f-adee2e1f25ce --spec .do/app.yaml
