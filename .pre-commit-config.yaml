repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # The default pre-commit-hooks repo is temporarily disabled because the
  # upstream hook manifest uses deprecated stage names incompatible with the
  # installed pre-commit client. Re-enable after upstream is fixed or point
  # to a patched local copy.
