services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/mt-gc-open-soft-2025/vibemeter-backend}:${TAG:-latest}
    container_name: vibemeter-backend
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      TOKEN_EXPIRY_SECONDS: ${TOKEN_EXPIRY_SECONDS:-3600}
      AGENT_SESSION_SIGNING_SECRET: ${AGENT_SESSION_SIGNING_SECRET:-wellbee-agent-session-secret}
      AGENT_INTERNAL_SYNC_SECRET: ${AGENT_INTERNAL_SYNC_SECRET:-wellbee-agent-sync-secret}
      AGENT_BOOTSTRAP_TOKEN_TTL_SECONDS: ${AGENT_BOOTSTRAP_TOKEN_TTL_SECONDS:-300}
      DB_NAME: ${DB_NAME}
      GEMINI_KEY: ${GEMINI_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-}
      # Agent seeding: internal URLs (backend→agent within Docker network)
      AGENT_SEED_ANCHOR_BASE_URL: ${AGENT_SEED_ANCHOR_BASE_URL:-http://agent-anchor:8101}
      AGENT_SEED_SPARK_BASE_URL: ${AGENT_SEED_SPARK_BASE_URL:-http://agent-spark:8102}
      AGENT_SEED_SAGE_BASE_URL: ${AGENT_SEED_SAGE_BASE_URL:-http://agent-sage:8103}
      # Agent seeding: public URLs (returned to browser for direct agent SSE connections)
      AGENT_SEED_ANCHOR_PUBLIC_URL: ${AGENT_SEED_ANCHOR_PUBLIC_URL:-}
      AGENT_SEED_SPARK_PUBLIC_URL: ${AGENT_SEED_SPARK_PUBLIC_URL:-}
      AGENT_SEED_SAGE_PUBLIC_URL: ${AGENT_SEED_SAGE_PUBLIC_URL:-}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent-anchor:
    image: ${AGENT_RUNTIME_IMAGE:-ghcr.io/mt-gc-open-soft-2025/wellbee-agent-runtime}:${TAG:-latest}
    container_name: wellbee-agent-anchor
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PORT: 8101
      AGENT_ID: anchor
      AGENT_DISPLAY_NAME: Anchor
      AGENT_PERSONA_KEY: anchor
      AGENT_SESSION_SIGNING_SECRET: ${AGENT_SESSION_SIGNING_SECRET:-wellbee-agent-session-secret}
      AGENT_INTERNAL_SYNC_SECRET: ${AGENT_INTERNAL_SYNC_SECRET:-wellbee-agent-sync-secret}
      MAIN_BACKEND_INTERNAL_URL: http://backend:8000/api/v1/internal
      GEMINI_KEY: ${GEMINI_KEY}
      REDIS_URL: ${REDIS_URL:-}
      CORS_ORIGINS: ${AGENT_CORS_ORIGINS:-https://wellbee.live,https://www.wellbee.live}
    ports:
      - "8101:8101"
    depends_on:
      backend:
        condition: service_healthy

  agent-spark:
    image: ${AGENT_RUNTIME_IMAGE:-ghcr.io/mt-gc-open-soft-2025/wellbee-agent-runtime}:${TAG:-latest}
    container_name: wellbee-agent-spark
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PORT: 8102
      AGENT_ID: spark
      AGENT_DISPLAY_NAME: Spark
      AGENT_PERSONA_KEY: spark
      AGENT_SESSION_SIGNING_SECRET: ${AGENT_SESSION_SIGNING_SECRET:-wellbee-agent-session-secret}
      AGENT_INTERNAL_SYNC_SECRET: ${AGENT_INTERNAL_SYNC_SECRET:-wellbee-agent-sync-secret}
      MAIN_BACKEND_INTERNAL_URL: http://backend:8000/api/v1/internal
      GEMINI_KEY: ${GEMINI_KEY}
      REDIS_URL: ${REDIS_URL:-}
      CORS_ORIGINS: ${AGENT_CORS_ORIGINS:-https://wellbee.live,https://www.wellbee.live}
    ports:
      - "8102:8102"
    depends_on:
      backend:
        condition: service_healthy

  agent-sage:
    image: ${AGENT_RUNTIME_IMAGE:-ghcr.io/mt-gc-open-soft-2025/wellbee-agent-runtime}:${TAG:-latest}
    container_name: wellbee-agent-sage
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      PORT: 8103
      AGENT_ID: sage
      AGENT_DISPLAY_NAME: Sage
      AGENT_PERSONA_KEY: sage
      AGENT_SESSION_SIGNING_SECRET: ${AGENT_SESSION_SIGNING_SECRET:-wellbee-agent-session-secret}
      AGENT_INTERNAL_SYNC_SECRET: ${AGENT_INTERNAL_SYNC_SECRET:-wellbee-agent-sync-secret}
      MAIN_BACKEND_INTERNAL_URL: http://backend:8000/api/v1/internal
      GEMINI_KEY: ${GEMINI_KEY}
      REDIS_URL: ${REDIS_URL:-}
      CORS_ORIGINS: ${AGENT_CORS_ORIGINS:-https://wellbee.live,https://www.wellbee.live}
    ports:
      - "8103:8103"
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/mt-gc-open-soft-2025/vibemeter-frontend}:${TAG:-latest}
    container_name: vibemeter-frontend
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      agent-anchor:
        condition: service_started
      agent-spark:
        condition: service_started
      agent-sage:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: vibemeter-net
